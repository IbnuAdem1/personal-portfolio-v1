<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmed Adem | Web Developer</title>
  <link href="../dist/output.css" rel="stylesheet">
</head>
<body>
<header id="navbar" class="fixed top-0 w-full z-50 transition-all duration-300 bg-white/70 backdrop-blur-md border-b border-transparent">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">

      <!-- Name-->
      <div class="shrink-0">
        <a href="#home" class="text-2xl font-bold tracking-tight text-gray-900 hover:text-blue-600 transition-colors">
          Ahmed<span class="text-blue-600">Adem</span>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex space-x-8">
        <a href="#home" class="text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Home</a>
        <a href="#about" class="text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">About</a>
        <a href="#skills" class="text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Skills</a>
        <a href="#projects" class="text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Projects</a>
        <a href="#contact" class="text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">Contact</a>
      </nav>

      <!-- Mobile menu button -->
      <div class="md:hidden flex items-center">
        <button id="mobile-menu-btn" class="text-gray-600 hover:text-gray-900 focus:outline-none p-2">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16">
            </path>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Navigation -->
  <div id="mobile-menu"
    class="hidden md:hidden bg-white/95 backdrop-blur-md border-b border-gray-100 absolute w-full shadow-lg transition-all duration-300">

    <div class="px-4 pt-2 pb-6 space-y-2">

      <a href="#home"
        class="mobile-link block px-3 py-2 rounded-md text-base font-medium text-gray-800 hover:text-blue-600 hover:bg-blue-50 transition-colors">
        Home
      </a>

      <a href="#about"
        class="mobile-link block px-3 py-2 rounded-md text-base font-medium text-gray-800 hover:text-blue-600 hover:bg-blue-50 transition-colors">
        About
      </a>

      <a href="#skills"
        class="mobile-link block px-3 py-2 rounded-md text-base font-medium text-gray-800 hover:text-blue-600 hover:bg-blue-50 transition-colors">
        Skills
      </a>

      <a href="#projects"
        class="mobile-link block px-3 py-2 rounded-md text-base font-medium text-gray-800 hover:text-blue-600 hover:bg-blue-50 transition-colors">
        Projects
      </a>

      <a href="#contact"
        class="mobile-link block px-3 py-2 rounded-md text-base font-medium text-gray-800 hover:text-blue-600 hover:bg-blue-50 transition-colors">
        Contact
      </a>

    </div>
  </div>

</header>
<script src="./script.js"></script>
</body>
</html>
